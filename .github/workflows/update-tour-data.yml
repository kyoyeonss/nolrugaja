name: 방문자 데이터 업데이트 & 배포

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: 패키지 설치
        run: npm ci --legacy-peer-deps
      - name: TourAPI 데이터 fetch
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
        run: node scripts/fetchTourData.js
      - name: 변경사항 커밋 & 푸시
        run: |
          git config user.name github-actions
          git config user.email actions@github.com
          git add src/data/
          git diff --staged --quiet || git commit -m "chore: TourAPI 데이터 자동 업데이트"
          git push
