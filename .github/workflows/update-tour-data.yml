name: 방문자 데이터 업데이트 & 배포

on:
  schedule:
    - cron: '0 15 * * *'  # 매일 자정 KST (UTC 15:00)
  workflow_dispatch:       # 수동 실행 가능

permissions:
  contents: write

jobs:
  update-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 방문자 데이터 fetch
        env:
          TOUR_API_KEY: ${{ secrets.TOUR_API_KEY }}
        run: node scripts/fetch-tour-data.js

      - name: 의존성 설치
        run: npm ci --legacy-peer-deps

      - name: 프로덕션 빌드
        env:
          VITE_KAKAO_MAP_KEY: ${{ secrets.VITE_KAKAO_MAP_KEY }}
        run: npm run build

      - name: GitHub Pages 배포
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: gh-pages
